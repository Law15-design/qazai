<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Qaza Tracker">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>Qaza-e-Umri Tracker</title>
</head>
<body>

<!-- ============ SETUP PAGE ============ -->
<div id="setup-page" class="page">
  <div class="container">
    <h1 class="app-title">Qaza-e-Umri</h1>
    <p class="subtitle">Let's work out what you owe, so you can start making it up.</p>

    <div class="card">
      <label class="field-label">How do you want to calculate?</label>
      <div class="toggle-group">
        <button type="button" class="toggle-btn active" data-mode="date">Start date</button>
        <button type="button" class="toggle-btn" data-mode="years">Years</button>
        <button type="button" class="toggle-btn" data-mode="age">Ages</button>
      </div>

      <div id="date-input-group" class="input-group">
        <label class="field-label" for="start-date">When did you stop praying regularly?</label>
        <input type="date" id="start-date" class="text-input">
      </div>

      <div id="years-input-group" class="input-group hidden">
        <label class="field-label" for="years-input">How many years?</label>
        <input type="number" id="years-input" class="text-input" placeholder="e.g. 5" min="0" step="0.1">
      </div>

      <div id="age-input-group" class="input-group hidden">
        <label class="field-label" for="age-stopped">Age you stopped praying regularly</label>
        <input type="number" id="age-stopped" class="text-input" placeholder="e.g. 12" min="0" max="100">
        <label class="field-label" for="age-started">Age you started praying punctually (or your current age, if you're only starting now)</label>
        <input type="number" id="age-started" class="text-input" placeholder="e.g. 20" min="0" max="100">
      </div>

      <label class="field-label" for="gender-select">Gender</label>
      <select id="gender-select" class="text-input">
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>

      <div id="female-fields" class="input-group hidden">
        <label class="field-label" for="cycle-days">Average days per month you don't pray (period/postpartum)</label>
        <input type="number" id="cycle-days" class="text-input" value="5" min="0" max="20">
      </div>

<div class="checkbox-row">
        <input type="checkbox" id="include-witr" checked>
        <label for="include-witr">Include Witr</label>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="already-done-toggle">
        <label for="already-done-toggle">I lost my data and have already made up some prayers (estimate)</label>
      </div>

      <button id="calculate-btn" class="primary-btn">Calculate</button>
    </div>

    <!-- Results / customize step -->
    <div id="results-card" class="card hidden">
      <label class="field-label">Here's your estimate — adjust any number if you need to</label>
      <div id="results-list" class="results-list"></div>
      <button id="save-start-btn" class="primary-btn">Save & Start Tracking</button>
    </div>
  </div>
</div>

<!-- ============ TRACKER PAGE ============ -->
<div id="tracker-page" class="page hidden">
  <div class="container">
    <h1 class="app-title small">Qaza-e-Umri</h1>

  <div class="overall-card">
      <div class="overall-top">
        <span>Overall Progress</span>
        <span id="overall-percent">0%</span>
      </div>
      <div class="progress-track">
        <div id="overall-fill" class="progress-fill gold"></div>
      </div>
      <div id="overall-years" class="years-text">≈ 0 days worth of prayers made up</div>
    </div>

    <div id="prayer-list" class="prayer-list"></div>

    <div class="backup-row">
      <button id="backup-btn" class="secondary-btn">Save Backup</button>
      <button id="restore-btn" class="secondary-btn">Load Backup</button>
      <input type="file" id="restore-file" accept=".json" class="hidden">
    </div>

    <button id="edit-setup-btn" class="text-link">Edit my starting numbers</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
